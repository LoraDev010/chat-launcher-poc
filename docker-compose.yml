services:
  backend:
    build:
      context: ./chat/server
      dockerfile: Dockerfile
    container_name: chat-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_PATH=/app/data/rooms.db
    volumes:
      - ./chat/server/src:/app/src:ro
      - ./chat/server/test:/app/test:ro
      - backend-data:/app/data
    command: npm run dev
    networks:
      - chat-network
    restart: unless-stopped

  frontend:
    build:
      context: ./chat/client
      dockerfile: Dockerfile
    container_name: chat-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_SERVER_URL=http://localhost:3000
    volumes:
      - ./chat/client/src:/app/src:ro
      - ./chat/client/index.html:/app/index.html:ro
      - ./chat/client/vite.config.ts:/app/vite.config.ts:ro
      - ./chat/client/tsconfig.json:/app/tsconfig.json:ro
    command: npm run dev -- --host
    depends_on:
      - backend
    networks:
      - chat-network
    restart: unless-stopped

volumes:
  backend-data:

networks:
  chat-network:
    driver: bridge
